spring:
  application:
    name: order-service

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

server:
  port: 0

eureka:
  client:
    enabled: false

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000